<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sonis - Family Tree</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* --- HIGH-END COMMERCIAL BACKGROUND (Warm Vintage Ivory) --- */
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #FFFCF8 0%, #F3EAE0 100%);
            min-height: 100vh;
            color: #1e293b; 
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* --- THE GRAND HEADER --- */
        .header-banner {
            text-align: center;
            padding: 50px 20px 20px 20px;
            animation: fadeSlideIn 1.5s ease-out forwards;
        }
        .family-title { 
            font-family: 'Cinzel', serif; 
            font-size: 3.5rem; 
            color: #0f172a; 
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }
        .title-divider {
            width: 80px; height: 3px; 
            background: #d4af37; 
            margin: 15px auto; border-radius: 2px;
        }
        .family-subtitle {
            font-size: 1.1rem; color: #64748b;
            letter-spacing: 2px; text-transform: uppercase;
        }

        /* --- THE QUOTE --- */
        .family-quote {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: #8b7355; 
            font-size: 1.25rem;
            margin: 25px auto 15px auto;
            max-width: 600px;
            line-height: 1.6;
        }

        @keyframes fadeSlideIn {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- THE SCROLLING CANVAS --- */
        .tree-wrapper {
            width: 100vw;
            overflow-x: auto; 
            display: flex; 
            justify-content: flex-start;
            padding: 40px;
            scrollbar-width: thin; 
            animation: fadeSlideIn 1.5s ease-out forwards;
            flex-grow: 1; 
        }

        /* --- THE TREE LINES --- */
        .tree { margin: auto; display: inline-flex; min-width: max-content; }
        .tree ul { padding-top: 40px; position: relative; display: flex; justify-content: center; }
        .tree li { text-align: center; list-style-type: none; position: relative; padding: 40px 15px 0 15px; }

        .tree li::before, .tree li::after {
            content: ''; position: absolute; top: 0; right: 50%;
            border-top: 2px solid #94a3b8; width: 50%; height: 40px;
        }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid #94a3b8; }

        .tree li.has-spouse::after { width: calc(50% + 160px); }

        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid #94a3b8; border-radius: 0 12px 0 0; }
        .tree li:first-child::after { border-radius: 12px 0 0 0; }

        .tree ul ul::before {
            content: ''; position: absolute; top: 0; left: 50%;
            border-left: 2px solid #94a3b8; width: 0; height: 40px;
            transform: translateX(-50%);
        }

        .tree li.has-spouse > ul { position: relative; left: 80px; }
        .tree li.has-spouse > ul::before { height: 60px; top: -20px; }

        /* --- THE CARDS --- */
        .node-container { position: relative; display: inline-block; z-index: 5; }

        .member-card { 
            width: 120px; 
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: transform 0.3s ease; 
        }
        .member-card:hover { transform: scale(1.08); z-index: 10; position: relative; }

        .photo-wrapper { 
            width: 90px; height: 90px; border-radius: 50%; padding: 4px; 
            background: white; border: 3px solid #cbd5e1; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.08); margin-bottom: 12px;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .photo-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .photo-wrapper img:-moz-loading, .photo-wrapper img:not([src]) { color: transparent; }

        .member-card.male .photo-wrapper { border-color: #3b82f6; }   
        .member-card.female .photo-wrapper { border-color: #ec4899; } 
        .member-card.unknown .photo-wrapper { border-color: #10b981; }

        .name { font-family: 'Playfair Display', serif; font-weight: 600; font-size: 1.15rem; color: #0f172a; line-height: 1.2; }
        .dates { font-size: 0.8rem; color: #64748b; font-weight: 500; margin-top: 4px; }

        /* --- THE SPOUSE LAYOUT --- */
        .spouse-wrapper { position: absolute; left: 160px; top: 0; }
        .spouse-wrapper::before {
            content: ''; position: absolute; right: 120px; top: 45px; 
            width: 40px; border-top: 2px dashed #94a3b8; z-index: -1;
        }

        /* --- THE DEVELOPER CREDIT FOOTER --- */
        .credit-footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 500;
            letter-spacing: 1px;
            animation: fadeSlideIn 2s ease-out forwards;
        }

        /* --- THE TEAM005 FLOATING LOGO --- */
        .team-logo {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #0f172a; 
            padding: 10px 22px;
            border-radius: 30px; 
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: 1px solid #d4af37; 
            z-index: 2000; 
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeSlideIn 2.5s ease-out forwards; 
        }
        .team-logo:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.3); 
        }
        .team-text { color: #ffffff; font-weight: 300; text-transform: uppercase; }
        .team-number { color: #d4af37; font-weight: 700; margin-left: 2px; }

        /* --- THE MODAL --- */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px);
            justify-content: center; align-items: center; z-index: 1000; 
        }
        .modal-content { 
            background: white; padding: 40px; border-radius: 20px; max-width: 450px; width: 90%; 
            text-align: center; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.2); 
        }
        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 28px; cursor: pointer; color: #94a3b8; transition: color 0.2s; }
        .close-btn:hover { color: #0f172a; }
        .modal-photo { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 4px solid white; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .modal-name { font-family: 'Cinzel', serif; font-weight: 700; font-size: 1.8rem; color: #0f172a; }
        .modal-bio { margin-top: 20px; font-size: 0.95rem; line-height: 1.7; color: #475569; text-align: left; }
    </style>
</head>
<body>

    <div class="header-banner">
        <h1 class="family-title">The Sonis</h1>
        <div class="title-divider"></div>
        <p class="family-subtitle">A Legacy of Generations</p>
        <p class="family-quote">"Like branches on a tree, we all grow in different directions, yet our roots remain as one."</p>
    </div>

    <div class="tree-wrapper" id="scroll-wrapper">
        <div id="tree-root" class="tree"></div>
    </div>

    <div class="credit-footer">
        Developer - Mohit Soni
    </div>

    <div class="team-logo">
        <span class="team-text">Team</span><span class="team-number">005</span>
    </div>

    <div id="bio-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modal-img" class="modal-photo" src="" alt="Profile">
            <h2 id="modal-name" class="modal-name"></h2>
            <p id="modal-dates" style="color: #64748b; font-size: 0.9rem; margin-top: 5px; font-weight: 500;"></p>
            <div id="modal-bio" class="modal-bio"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>

</body>
</html>
